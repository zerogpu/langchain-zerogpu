name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + type + unit (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy langchain_zerogpu

      - name: Unit tests (sockets disabled)
        run: uv run pytest --disable-socket tests/unit_tests

  changelog:
    name: Check CHANGELOG.md updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check CHANGELOG.md updated
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "$BASE_REF"

          # Only enforce when package code changed.
          if git diff --quiet "origin/$BASE_REF" -- langchain_zerogpu/ pyproject.toml; then
            echo "No package changes — CHANGELOG update not required."
            exit 0
          fi

          if git diff --quiet "origin/$BASE_REF" -- CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Package files changed but CHANGELOG.md was not updated. Add the changes under '## [Unreleased]' (they become the GitHub release notes at release time)."
            exit 1
          fi

          echo "CHANGELOG.md updated."
